specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Allscripts Healthcare Solutions
providerId: allscripts-healthcare-solutions
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Healthcare IT
  - EHR
  - Clinical
  - FHIR
  - Rate Limiting
description: Allscripts / Veradigm does not publish concrete public per-second or per-minute API rate
  limits. Limits for Unity, FHIR, and Practice Fusion APIs are enforced per partner registration and per
  FHIR-server tenant. Patient-facing FHIR endpoints follow ONC / Cures Act non-discrimination requirements
  but are subject to operational throttling.
sources:
  - https://veradigm.com
  - https://developer.veradigm.com
notes: No public TPS/RPM numbers. Reconcile against partner-program registration and tenant-specific FHIR-server
  limits.
responseCodes:
  throttled: 429
  unauthorized: 401
limits:
  - name: Unity API Per-Partner Throughput
    scope: partner
    metric: varies
    limit: per-partner-registration; not publicly documented
  - name: FHIR API Tenant Throughput
    scope: tenant
    metric: varies
    limit: per-tenant; not publicly documented but enforced by the FHIR server
  - name: Practice Fusion API
    scope: partner
    metric: varies
    limit: per-partner-registration; not publicly documented
policies:
  - name: SMART-on-FHIR Authorization
    description: FHIR API access uses SMART-on-FHIR / OAuth 2.0 authorization with launch contexts; tokens
      are scoped per app and per patient.
  - name: Backoff Strategy
    description: On 429 responses implement exponential backoff with jitter and honor Retry-After if returned.
  - name: ONC Non-Discrimination
    description: Patient-access FHIR endpoints must not discriminate against certified app developers per
      21st Century Cures Act information-blocking rules; throttling must be reasonable and operationally
      justified.
  - name: Partner Registration
    description: Partner-program registration governs production-tier rate-limit allowances and certification
      status.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Allscripts Healthcare Solutions
providerId: allscripts-healthcare-solutions
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Healthcare IT
  - EHR
  - Clinical
  - FHIR
  - Veradigm
description: Allscripts (now Veradigm) provides EHR APIs for ambulatory and acute-care customers, including
  Unity (proprietary) and FHIR R4 endpoints supporting USCDI / 21st Century Cures Act regulated data exchange.
  Read-only FHIR access for patient/app developers can be free under regulatory requirements; commercial
  Unity API access for Sunrise / TouchWorks / Practice Fusion integrations is gated behind Veradigm Developer
  Program agreements with custom commercial terms.
sources:
  - https://veradigm.com
  - https://developer.veradigm.com
notes: Public price list is not published. Plans below are placeholder shells; replace with negotiated
  Developer Program terms once contracted.
plans:
  - id: allscripts-healthcare-solutions-fhir-regulated
    name: FHIR Regulated Access (USCDI / Cures Act)
    type: freemium
    description: Free patient and app-developer access to FHIR R4 endpoints required by the 21st Century
      Cures Act / USCDI regulations. Subject to registration and SMART-on-FHIR launch contexts.
    entries:
      - label: FHIR R4 API Access
        description: Regulated patient/app-developer FHIR API access
        name: fhir_access
        type: flat
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: FHIR R4 Patient Access
      - name: SMART-on-FHIR App Launch
      - name: USCDI Data Classes
  - id: allscripts-healthcare-solutions-developer-program
    name: Veradigm Developer Program
    type: enterprise
    description: Commercial integration program for ISVs / partners building on Sunrise, TouchWorks, Professional,
      and Practice Fusion. Custom commercial terms covering Unity API and embedded analytics.
    entries:
      - label: Developer Program Subscription
        description: Annual program subscription with negotiated API access scope
        name: developer_program
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Unity API Access
      - name: Veradigm FHIR API Access
      - name: Practice Fusion API Access
      - name: Partner Account Management
      - name: Sandbox Access
      - name: Certification Program
  - id: allscripts-healthcare-solutions-enterprise
    name: Enterprise / Health-System Customer
    type: enterprise
    description: Direct customer engagement for health-system EHR licensing including bundled API access
      across the Veradigm portfolio.
    entries:
      - label: Enterprise Subscription
        description: Custom-quoted health-system EHR contract
        name: enterprise_subscription
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Sunrise EHR
      - name: TouchWorks EHR
      - name: Practice Fusion
      - name: Embedded Analytics
      - name: Premium Support

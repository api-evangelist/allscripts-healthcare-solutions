serviceCategory: Electronic Health Records
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Healthcare IT
  - EHR
  - Clinical
  - FHIR
  - Veradigm
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps shell for Allscripts / Veradigm: regulated FHIR API access is free per
  ONC / Cures Act mandate; commercial Unity API and Veradigm Developer Program access is contract-based
  with custom terms. Reconcile meter rates against the negotiated developer-program or health-system contract.'
sources:
  - https://veradigm.com
  - https://developer.veradigm.com
  - https://focus.finops.org/focus-specification/v1-3/
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Allscripts / Veradigm Healthcare APIs
  ServiceCategory: Electronic Health Records
  ProviderName: Veradigm
  PublisherName: Veradigm Inc.
  InvoiceIssuerName: Veradigm Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: developer_program_subscription
    description: Annual partner / developer-program subscription
    unit: contract-year
    aggregation: sum
    dimensions:
      - product
      - tier
  - name: ehr_subscription
    description: Annual health-system EHR subscription bundling API access
    unit: contract-year
    aggregation: sum
    dimensions:
      - product
      - facility
  - name: api_calls
    description: API call volume (where contractually metered for high-volume integrations)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - tenant
  - name: fhir_calls
    description: Regulated FHIR API call volume (no charge under ONC mandate)
    unit: request
    aggregation: sum
    dimensions:
      - resource
      - tenant
principles:
  - name: Visibility
    description: Track Veradigm partner/program invoices and tenant utilization through Veradigm customer
      portals; correlate API usage to specific clinical workflows.
  - name: Allocation
    description: Allocate Veradigm spend to clinical product lines (ambulatory / acute / patient engagement)
      and to ISV-partner integrations.
  - name: Optimization
    description: Consolidate redundant ISV integrations during contract renewals; align Unity vs FHIR usage
      to lowest-cost path; lean on regulated free FHIR access where feature parity exists.
  - name: Accountability
    description: Owned by health-system CIO / IT or the ISV's product owner; reviewed against clinical
      KPIs (note completion time, claims throughput, patient access).
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
